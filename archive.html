<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الأرشيف — الكناشة</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="hero">
    <div class="geo-pattern"></div>
    <div class="hero-inner">
      <nav class="main-nav">
        <a href="index.html">الصفحة الرئيسية</a>
        <a href="archive.html">الأرشيف</a>
      </nav>

      <h1>الأرشيف</h1>
      <p class="tagline">مرتبة من الأحدث إلى الأقدم</p>
    </div>
  </div>

  <section>
    <div class="section-header">
      <span class="ornament">&#10022;</span>
      <h2>الأرشيف</h2>
    </div>
    <div class="quotes-container">
      <!-- الصناديق سُتُملأ بجافاسكريبت من quotes.json -->
    </div>
  </section>

  <footer>
    <div class="geo-pattern"></div>
    <div class="inner">
      <div class="logo">الكناشة</div>
      <p class="sub-text">فوائد تُنير القلب وتُحيي الروح</p>
      <a class="cta" href="https://t.me/mshkanjmbot?start" target="_blank">
        <i class="ti ti-brand-telegram"></i>
        انضم الآن
      </a>
      <p class="handle">المطور: عبدالرحمن النجم</p>
    </div>
  </footer>

  <script>
    // تحميل الاقتباسات من ملف JSON وعرضها في الصناديق
    async function loadQuotes() {
      try {
        const resp = await fetch('quotes.json');
        const data = await resp.json();
        // نعرض من الأحدث إلى الأقدم (أحدث عنصر هو الأخير في المصفوفة)
        const container = document.querySelector('.quotes-container');
        container.innerHTML = '';
        // عكس الترتيب لتظهر الأحدث أولاً
        data.slice().reverse().forEach(item => {
          const box = document.createElement('div');
          box.className = 'quote-box';
          box.innerHTML = `
            <blockquote class="quote-text">«${item.text}»</blockquote>
            <div class="quote-source">— ${item.source}</div>
          `;
          container.appendChild(box);
        });
      } catch (e) {
        console.error('خطأ في تحميل الاقتباسات', e);
      }
    }
    // شغل عند تحميل الصفحة
    loadQuotes();
  </script>
</body>
</html>
